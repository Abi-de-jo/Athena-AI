name: publish-npm

on:
  push:
    branches: [dev]
    paths:
      - "packages/rimuru/package.json"
      - "packages/rimuru/.rimuru/**"
      - "packages/rimuru/src/**"
      - ".github/workflows/publish-npm.yml"

jobs:
  publish:
    if: github.repository == 'gowdaman-dev/rimuru-ai'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolve catalog references
        run: |
          node -e "
            const root = JSON.parse(require('fs').readFileSync('../../package.json','utf8'));
            const pkg = JSON.parse(require('fs').readFileSync('package.json','utf8'));
            const catalog = root.workspaces?.catalog || {};
            ['dependencies','devDependencies','peerDependencies','overrides'].forEach(section => {
              if (!pkg[section]) return;
              Object.keys(pkg[section]).forEach(key => {
                if (pkg[section][key] === 'catalog:' && catalog[key]) {
                  pkg[section][key] = catalog[key];
                }
              });
            });
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            const resolved = Object.keys(catalog).filter(k => ['dependencies','devDependencies','overrides'].some(s => pkg[s]?.[k] === catalog[k]));
            console.log('Resolved:', resolved.join(', ') || '(none)');
          "
        working-directory: packages/rimuru

      - name: Publish to npm
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "ERROR: NPM_TOKEN secret is empty. Add it at:"
            echo "  https://github.com/gowdaman-dev/rimuru-ai/settings/secrets/actions"
            exit 1
          fi
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          npm publish --access public
        working-directory: packages/rimuru
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
