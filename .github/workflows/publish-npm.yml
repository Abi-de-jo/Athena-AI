name: publish-npm

on:
  push:
    branches: [dev]
    paths:
      - "packages/rimuru/package.json"
      - "packages/rimuru/.rimuru/**"
      - "packages/rimuru/src/**"
      - ".github/workflows/publish-npm.yml"
  workflow_dispatch:

jobs:
  publish:
    if: github.repository == 'gowdaman-dev/rimuru-ai'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Vendor sub-packages and resolve all refs
        run: |
          node -e "
            const fs = require('fs');
            const root = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const catalog = root.workspaces?.catalog || {};

            // Package name → vendor directory name
            const vendorMap = {
              '@rimurucode-ai/effect-drizzle-sqlite': 'effect-drizzle-sqlite',
              '@rimurucode-ai/effect-sqlite-node': 'effect-sqlite-node',
              '@rimurucode-ai/sdk': 'sdk',
              '@rimurucode-ai/script': 'script',
              '@rimurucode-ai/llm': 'llm',
              '@rimurucode-ai/core': 'core',
              '@rimurucode-ai/plugin': 'plugin',
              '@rimurucode-ai/ui': 'ui',
              '@rimurucode-ai/server': 'server',
              '@rimurucode-ai/tui': 'tui',
            };

            // Vendor dir → source dir
            const srcDirs = {
              'effect-drizzle-sqlite': 'packages/effect-drizzle-sqlite',
              'effect-sqlite-node': 'packages/effect-sqlite-node',
              'sdk': 'packages/sdk/js',
              'script': 'packages/script',
              'llm': 'packages/llm',
              'core': 'packages/core',
              'plugin': 'packages/plugin',
              'ui': 'packages/ui',
              'server': 'packages/server',
              'tui': 'packages/tui',
            };

            const vendorDir = 'packages/rimuru/vendor';
            fs.rmSync(vendorDir, { recursive: true, force: true });
            fs.mkdirSync(vendorDir, { recursive: true });

            // Copy each sub-package into vendor dir (skip node_modules, .turbo, dist)
            for (const [vendir, srcdir] of Object.entries(srcDirs)) {
              const target = vendorDir + '/' + vendir;
              fs.cpSync(srcdir, target, {
                recursive: true,
                filter: (src) =>
                  !src.includes('node_modules') &&
                  !src.includes('.turbo') &&
                  !src.includes('/dist/')
              });
            }

            // Resolve catalog: and workspace:* in every vendored sub-package
            function resolveVendorPkg(vendir) {
              const path = vendorDir + '/' + vendir + '/package.json';
              const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
              ['dependencies','devDependencies','peerDependencies','overrides'].forEach(section => {
                if (!pkg[section]) return;
                Object.keys(pkg[section]).forEach(key => {
                  // Resolve catalog:
                  if (pkg[section][key] === 'catalog:' && catalog[key]) {
                    pkg[section][key] = catalog[key];
                  }
                  // Resolve workspace:* → file: (relative between vendor dirs)
                  if (pkg[section][key] === 'workspace:*' && vendorMap[key]) {
                    pkg[section][key] = 'file:../' + vendorMap[key];
                  }
                });
              });
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
              console.log('  vendor/' + vendir + '/package.json resolved');
            }

            for (const vendir of Object.keys(srcDirs)) {
              resolveVendorPkg(vendir);
            }

            // Update rimuru's package.json
            const rimuruDir = 'packages/rimuru';
            const rimuruPkg = JSON.parse(fs.readFileSync(rimuruDir + '/package.json', 'utf8'));

            // Add vendor/ to files
            if (!rimuruPkg.files.includes('vendor/')) {
              rimuruPkg.files.push('vendor/');
            }

            // Resolve workspace:* → file:vendor/<dir> in rimuru-ai
            ['dependencies','devDependencies'].forEach(section => {
              if (!rimuruPkg[section]) return;
              Object.keys(rimuruPkg[section]).forEach(key => {
                if (vendorMap[key] && rimuruPkg[section][key] === 'workspace:*') {
                  rimuruPkg[section][key] = 'file:vendor/' + vendorMap[key];
                  console.log('  ' + key + ' → file:vendor/' + vendorMap[key]);
                } else if (rimuruPkg[section][key] === 'catalog:' && catalog[key]) {
                  rimuruPkg[section][key] = catalog[key];
                  console.log('  ' + key + ' → ' + catalog[key] + ' (catalog)');
                }
              });
            });

            fs.writeFileSync(rimuruDir + '/package.json', JSON.stringify(rimuruPkg, null, 2) + '\n');
            console.log('rimuru-ai package.json updated with vendor deps');
          "

      - name: Publish rimuru-ai
        run: |
          echo '//registry.npmjs.org/:_authToken=${NPM_TOKEN}' > ~/.npmrc
          npm publish --access public
        working-directory: packages/rimuru
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
