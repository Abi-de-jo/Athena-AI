name: publish-npm

on:
  push:
    branches: [dev]
    paths:
      - "packages/rimuru/package.json"
      - "packages/rimuru/.rimuru/**"
      - "packages/rimuru/src/**"
      - ".github/workflows/publish-npm.yml"
  workflow_dispatch:

jobs:
  publish:
    if: github.repository == 'gowdaman-dev/rimuru-ai'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolve catalog and workspace refs
        run: |
          node -e "
            const fs = require('fs');
            const root = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const catalog = root.workspaces?.catalog || {};

            const publishOrder = [
              { dir: 'packages/effect-drizzle-sqlite', name: '@rimurucode-ai/effect-drizzle-sqlite' },
              { dir: 'packages/effect-sqlite-node', name: '@rimurucode-ai/effect-sqlite-node' },
              { dir: 'packages/sdk/js', name: '@rimurucode-ai/sdk' },
              { dir: 'packages/script', name: '@rimurucode-ai/script' },
              { dir: 'packages/llm', name: '@rimurucode-ai/llm' },
              { dir: 'packages/core', name: '@rimurucode-ai/core' },
              { dir: 'packages/plugin', name: '@rimurucode-ai/plugin' },
              { dir: 'packages/ui', name: '@rimurucode-ai/ui' },
              { dir: 'packages/server', name: '@rimurucode-ai/server' },
              { dir: 'packages/tui', name: '@rimurucode-ai/tui' },
              { dir: 'packages/rimuru', name: 'rimuru-ai' },
            ];

            const wsVersions = {};
            for (const p of publishOrder) {
              const pkg = JSON.parse(fs.readFileSync(p.dir + '/package.json', 'utf8'));
              wsVersions[p.name] = pkg.version || '1.17.7';
            }

            function resolve(pkg) {
              const updated = {};
              ['dependencies','devDependencies','peerDependencies','overrides'].forEach(section => {
                if (!pkg[section]) return;
                const resolved = {};
                Object.keys(pkg[section]).forEach(key => {
                  if (pkg[section][key] === 'catalog:' && catalog[key]) {
                    resolved[key] = catalog[key];
                  } else if (pkg[section][key] === 'workspace:*' && wsVersions[key]) {
                    resolved[key] = '^' + wsVersions[key];
                  } else {
                    resolved[key] = pkg[section][key];
                  }
                });
                if (Object.keys(resolved).length > 0) updated[section] = resolved;
              });
              return updated;
            }

            for (const p of publishOrder) {
              const path = p.dir + '/package.json';
              const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
              const resolved = resolve(pkg);
              Object.assign(pkg, resolved);
              // Remove overrides (can conflict at publish time)
              delete pkg.overrides;
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
              const depCount = Object.keys(pkg.dependencies || {}).length;
              console.log(p.name + ': resolved, ' + depCount + ' deps');
            }
          "

      - name: Publish sub-packages
        run: |
          echo '//registry.npmjs.org/:_authToken=${NPM_TOKEN}' > ~/.npmrc
          set -e
          for dir in \
            packages/effect-drizzle-sqlite \
            packages/effect-sqlite-node \
            packages/sdk/js \
            packages/script \
            packages/llm \
            packages/core \
            packages/plugin \
            packages/ui \
            packages/server \
            packages/tui
          do
            name=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$dir/package.json','utf8')).name)")
            ver=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$dir/package.json','utf8')).version)")
            if npm view "$name@$ver" version &>/dev/null; then
              echo "✓ Already published $name@$ver"
            else
              echo "→ Publishing $name@$ver..."
              (cd "$dir" && npm publish --access public)
            fi
          done
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish rimuru-ai
        run: |
          npm publish --access public
        working-directory: packages/rimuru
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
