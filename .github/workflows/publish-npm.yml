name: publish-npm

on:
  push:
    branches: [dev]
    paths:
      - "packages/rimuru/package.json"
      - "packages/rimuru/.rimuru/**"
      - "packages/rimuru/src/**"
      - ".github/workflows/publish-npm.yml"
  workflow_dispatch:

jobs:
  publish:
    if: github.repository == 'gowdaman-dev/rimuru-ai'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Vendor sub-packages and prepare package
        run: node script/prepare-publish.js

      - name: Publish rimuru-ai
        run: |
          echo '//registry.npmjs.org/:_authToken=${NPM_TOKEN}' > ~/.npmrc
          npm publish --access public --ignore-scripts
        working-directory: packages/rimuru
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
