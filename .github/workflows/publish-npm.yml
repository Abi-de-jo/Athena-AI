name: publish-npm

on:
  push:
    branches: [dev]
    paths:
      - "packages/rimuru/package.json"
      - "packages/rimuru/.rimuru/**"
      - "packages/rimuru/src/**"
      - ".github/workflows/publish-npm.yml"

jobs:
  publish:
    if: github.repository == 'gowdaman-dev/rimuru-ai'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        if: env.NODE_AUTH_TOKEN != ''
        run: npm publish --access public || true
        working-directory: packages/rimuru
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
