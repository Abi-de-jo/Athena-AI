name: publish-npm

on:
  push:
    branches: [dev]
    paths:
      - "packages/rimuru/package.json"
      - "packages/rimuru/.rimuru/**"
      - "packages/rimuru/src/**"
      - ".github/workflows/publish-npm.yml"
  workflow_dispatch:

jobs:
  publish:
    if: github.repository == 'gowdaman-dev/rimuru-ai'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolve catalog + workspace refs for rimuru-ai
        run: |
          node -e "
            const fs = require('fs');
            const root = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const catalog = root.workspaces?.catalog || {};
            const pkg = JSON.parse(fs.readFileSync('packages/rimuru/package.json', 'utf8'));
            delete pkg.overrides;
            ['dependencies','devDependencies'].forEach(section => {
              if (!pkg[section]) return;
              Object.keys(pkg[section]).forEach(key => {
                if (pkg[section][key] === 'catalog:' && catalog[key]) {
                  pkg[section][key] = catalog[key];
                }
                if (pkg[section][key] === 'workspace:*') {
                  pkg[section][key] = '^1.17.7';
                }
              });
            });
            fs.writeFileSync('packages/rimuru/package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('Resolved deps for publish');
          "

      - name: Publish rimuru-ai
        run: |
          echo '//registry.npmjs.org/:_authToken=${NPM_TOKEN}' > ~/.npmrc
          npm publish --access public
        working-directory: packages/rimuru
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
