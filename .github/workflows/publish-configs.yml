name: publish-configs

on:
  push:
    branches: [dev]
    paths:
      - ".rimuru/**"
      - "install"
      - "README.md"
      - ".github/workflows/publish-configs.yml"

jobs:
  publish:
    if: github.repository == 'gowdaman-dev/rimuru-ai'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild rimuru-configs.tar.gz
        run: |
          rm -f rimuru-configs.tar.gz
          tar czf rimuru-configs.tar.gz -C . .rimuru/

      - name: Push to rimurucode-ai (public)
        env:
          GH_TOKEN: ${{ secrets.RIMURUCODE_PAT }}
        run: |
          gh auth setup-git
          gh repo clone gowdaman-dev/rimurucode-ai /tmp/public-repo -- --depth 1
          cd /tmp/public-repo
          cp $GITHUB_WORKSPACE/install .
          cp $GITHUB_WORKSPACE/rimuru-configs.tar.gz .
          cp $GITHUB_WORKSPACE/README.md .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add install rimuru-configs.tar.gz README.md
          if git diff --staged --quiet; then
            echo "No changes to publish"
          else
            git commit -m "auto: sync configs from rimuru-ai@${GITHUB_SHA::7}"
            git push origin main
            echo "Published to rimurucode-ai"
          fi
