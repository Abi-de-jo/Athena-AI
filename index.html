<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rimuru AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0a0a0b;
      color: #e4e4e7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #a78bfa, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 1.125rem;
      color: #a1a1aa;
      margin-bottom: 2rem;
    }
    code {
      background: #18181b;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      display: inline-block;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.9rem;
      border: 1px solid #27272a;
    }
    .links { margin-top: 2rem; display: flex; gap: 1.5rem; }
    a {
      color: #818cf8;
      text-decoration: none;
      font-size: 0.9rem;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Rimuru AI</h1>
  <p>The open source AI coding agent.</p>
  <code>curl -fsSL https://rimurucode.vercel.app/install | bash</code>
  <div class="links">
    <a href="https://github.com/gowdaman-dev/rimuru-ai">GitHub</a>
    <a href="/docs">Docs</a>
  </div>
</body>
</html>
